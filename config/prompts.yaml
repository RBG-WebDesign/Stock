# NOTE: This is a refined version of the prompts configuration file. 
# It emphasizes Technofundamental synergy, VCP patterns, and Institutional Accumulation.

# =============================================================================
# System Prompts (Persona and Output Enforcement)
# =============================================================================
system_prompts:
  swing_trader: |
    You are a professional hedge fund analyst and proprietary trader specializing in "Technofundamental" swing trading. 
    Your methodology is a strict synthesis of William O'Neil's CAN SLIM and Mark Minervini's Volatility Contraction Pattern (VCP).

    CORE MISSION: Identify high-conviction growth stocks (small/mid-cap) that are emerging from sound bases or showing clear signs of quiet institutional accumulation.
    
    CRITICAL CONSTRAINTS:
    - Prioritize current price action over theoretical potential.
    - Be ruthless: If a setup is sloppy, call it out.
    - Use the provided JSON data for quantitative precision and the Charts for visual confirmation of "dry ups" and "tightness."
    - Respond ONLY with a valid, strictly formatted JSON object. Do not include introductory text, conversational filler, or markdown code blocks (e.g., no ```json).

# =============================================================================
# User Prompts (Specific Analysis Instructions)
# =============================================================================
user_prompts:
  
  # 1. The "Master Analyst" Comprehensive Prompt (The Primary Workhorse)
  master_analyst: |
    Analyze the following stock for a potential "Stage 2" breakout entry: {ticker}.
    
    FUNDAMENTAL DATA PAYLOAD:
    {fundamentals}
    
    CHART CONTEXT:
    I have attached the 1-Year Daily chart and the 5-Year Weekly chart for {ticker}. The charts include volume and key moving averages (50-day, 100-day, 200-day).
    
    Perform a complete Quantamental analysis:
    
    Part 1: Quality & Catalyst (Based on JSON)
    - Analyze 'recent_performance' for 20%+ Y/Y and Q/Q acceleration.
    - Check 'financial_health': Are Altman-Z (>3.0) and Piotroski (>6) scores indicating high quality?
    - Evaluate 'recent_news' and 'earnings_integrity' for a "New" catalyst (positive surprises or business pivots).
    - Analyze 'supply_demand': Is the 'institutional_trend' Increasing?
    
    Part 2: The Footprint (Based on Charts)
    - Trend Template: Confirm Price > 50MA > 100MA > 200MA. Is the 200MA trending up for at least 1 month?
    - Volatility Contraction Pattern (VCP): Count the contractions (e.g., T1, T2, T3). Is the price "tightening" on the right side of the base?
    - Volume Analysis: Look for "Dry Up" (extremely low volume) during the most recent price contraction or "Pocket Pivots" (high volume spikes coming off moving averages).
    
    Part 3: The Verdict
    Synthesize your findings and output the exact JSON schema requested, including a confident entry Pivot Point, a logical Stop Loss level based on recent swing lows, and a Confidence Score (1-10) based on how perfectly the fundamentals and technicals align.

  # 2. The "Institutional Accumulator" Prompt (Focused on finding setups before the breakout)
  institutional_accumulator: |
    Evaluate if {ticker} is currently in a "Steady Institutional Accumulation" phase.
    
    FUNDAMENTAL DATA PAYLOAD:
    {fundamentals}
    
    ANALYSIS STEPS:
    1. Institutional Trend: Analyze 'supply_demand.institutional_trend' and ownership %. Is big money quietly moving in?
    2. Pocket Pivots: Identify any volume spikes on the charts that occur within the consolidation base, specifically those coming from the 10-day or 50-day moving averages.
    3. Blue Chip Backing: Check 'analyst_sentiment'. Are reputable firms maintaining "Outperform" or "Overweight" ratings?
    4. Price/Volume Footprint: On the Daily chart, do you see more "Wide-Range Up Days" on high volume than "Down Days" on high volume? This indicates accumulation.
    5. Base Tightness: Is the stock forming a "cheat" or a "handle" with very low volatility?
    
    Output your findings strictly in the MasterAnalystOutput JSON format.

  # 3. The "CAN SLIM" Growth Prompt
  can_slim_growth: |
    Perform a strict CAN SLIM audit on {ticker}.
    
    FUNDAMENTAL DATA PAYLOAD:
    {fundamentals}
    
    Analyze the following pillars:
    - C & A: Use 'recent_performance' (Y/Y and Q/Q). Look for EPS and Revenue growth exceeding 20-25%. Verify if 'future_outlook' supports expansion.
    - N: Identify catalysts via 'recent_news' and 'earnings_integrity' (positive surprises acting as "New" drivers).
    - S: Analyze Supply/Demand. Check 'supply_demand.float' and visual volume accumulation on charts. Smaller floats are preferred.
    - L: Assessment of relative strength. Use 'price_performance' (1M, 3M, 6M) to see if it is outperforming peers/market.
    - I: Use 'supply_demand.institutional_ownership_percent' and 'institutional_trend'.
    - M: Evaluate the overall market structure shown in the charts. Is the trend constructive?
    
    Part 2: Execution
    - Define an optimal "Pivot Point" for entry and a "Stop Loss" based on the base structure and risk/reward.
    
    Output your final analysis strictly in the CanSlimOutput JSON format.

  # 4. The "Price Action & Entry" Prompt (Pure Technicals)
  price_action_entry: |
    Identify a high-probability swing trade entry for {ticker} focusing purely on technicals.
    
    CHART CONTEXT:
    I have attached the recent Price OHLC data and Volume charts. 
    CURRENT PRICE METRICS: {technicals}
    
    1. Market Structure: Are we making Higher Highs and Higher Lows? Is there a "Change of Character" (CHoCH) visible?
    2. Supply/Demand: Identify the price zone with the heaviest volume consolidation (Point of Control).
    3. Base Classification: Is this a Cup-with-Handle, a Flat Base, a High Tight Flag, or a VCP?
    4. Risk/Reward: Define the optimal breakout "Pivot Point" and a "Stop Loss" where the setup is officially invalidated.
    
    Output your findings strictly in the PriceActionEntryOutput JSON format.
